services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snidanok
      POSTGRES_PASSWORD: snidanok
      POSTGRES_DB: snidanok_development
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snidanok -d snidanok_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: snidanok-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/rails server -b 0.0.0.0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://snidanok:snidanok@db:5432/snidanok_development
      RAILS_ENV: development

  css:
    image: snidanok-dev
    command: bin/rails tailwindcss:watch
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - web

volumes:
  pg_data:
  bundle_cache: