default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default

test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", "postgres://snidanok:snidanok@db:5432/snidanok_test") %>

production:
  <<: *default
